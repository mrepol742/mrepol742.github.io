name: Build & Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - name: Download Dependecies
        run: composer install
      - name: Set up JDK 17
        uses: actions/setup-java@v1
        with:
          java-version: 17
      - name: Start Localhost & Download Site
        run: |
          php -S localhost:8000
          wget -mpEk "http://localhost:8000"
      - name: Build Sitemap
        run: |
          javac Sitemap.java
          java Sitemap
      - name: Update RSS
        run: |
          javac RSS.java
          java RSS
      - name: IndexNow
        run: |
          javac IndexNow.java
          java IndexNow
      - name: Delete files
        run: |
          rm -rf org Sitemap.java Sitemap.class RSS.java RSS.class Link.class Item.class .github .gitignore IndexNow.java IndexNow.class
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
